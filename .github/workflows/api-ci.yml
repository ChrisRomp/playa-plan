name: API CI
permissions:
  contents: read
  packages: write

on:
  push:
    # Tag pushes will trigger the workflow regardless of which files changed
    tags:
      - 'v*.*.*'
    # Branch pushes only trigger the workflow if specific files changed
    branches: 
      - main
    paths:
      - 'apps/api/**'
      - '.github/workflows/api-ci.yml'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [ main ]
    paths:
      - 'apps/api/**'
      - '.github/workflows/api-ci.yml'
      - 'package.json'
      - 'package-lock.json'

jobs:
  build-and-test:
    name: Build and Test API
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        node-version: [22.x]

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: playa_plan_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install workspace dependencies (root)
      run: npm ci

    # Ensure Prisma client is generated (root install places @prisma/client in root node_modules)
    - name: Generate Prisma client
      working-directory: apps/api
      run: npx prisma generate
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/playa_plan_test?schema=public
    
    - name: Run migrations
      working-directory: apps/api
      run: npx prisma migrate deploy
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/playa_plan_test?schema=public
    
    - name: Build API
      working-directory: apps/api
      run: npm run build
      
    - name: Test API
      working-directory: apps/api
      run: npm run test
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/playa_plan_test?schema=public
        JWT_SECRET: test_jwt_secret
        JWT_EXPIRATION_TIME: 24h

  build-container:
    name: Build API Image (${{ matrix.arch }})
    needs: build-and-test
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm64
    runs-on: ${{ matrix.runner }}
    env:
      REGISTRY_IMAGE: ghcr.io/${{ github.repository }}/api
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to GitHub Container Registry
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract version from tag
      id: extract-version
      run: |
        VERSION="dev"
        if [[ "${{ github.ref }}" == "refs/tags/v"* ]]; then
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
        fi
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        
    - name: Generate build timestamp
      id: build-timestamp
      run: echo "timestamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

    - name: Build Docker image
      id: build
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./apps/api/Dockerfile
        platforms: linux/${{ matrix.arch }}
        build-args: |
          IMAGE_VERSION=${{ steps.extract-version.outputs.VERSION }}
          BUILD_DATE=${{ steps.build-timestamp.outputs.timestamp }}
          GIT_COMMIT=${{ github.sha }}
        cache-from: type=gha,scope=api-${{ matrix.arch }}
        cache-to: type=gha,scope=api-${{ matrix.arch }},mode=max
        # On main/tags: push by digest for multi-arch manifest; on PRs: just validate the build
        outputs: >-
          ${{ (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')))
              && format('type=image,name={0},push-by-digest=true,name-canonical=true,push=true', env.REGISTRY_IMAGE)
              || '' }}

    - name: Export digest
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
      run: |
        mkdir -p /tmp/digests
        digest="${{ steps.build.outputs.digest }}"
        touch "/tmp/digests/${digest#sha256:}"
    
    - name: Upload digest
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
      uses: actions/upload-artifact@v4
      with:
        name: api-digests-${{ matrix.arch }}
        path: /tmp/digests/*
        if-no-files-found: error
        retention-days: 1

  publish-container:
    name: Publish API Container
    needs: build-container
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      REGISTRY_IMAGE: ghcr.io/${{ github.repository }}/api
    
    steps:
    - name: Download digests
      uses: actions/download-artifact@v4
      with:
        path: /tmp/digests
        pattern: api-digests-*
        merge-multiple: true
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY_IMAGE }}
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=sha
          type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
        flavor: |
          latest=false
    
    - name: Create manifest list and push
      working-directory: /tmp/digests
      run: |
        docker buildx imagetools create \
          $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
          $(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)
    
    - name: Inspect image
      run: |
        tag=$(echo "$DOCKER_METADATA_OUTPUT_JSON" | jq -r '.tags[0]')
        docker buildx imagetools inspect "$tag"
