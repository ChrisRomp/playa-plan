name: E2E Tests

permissions:
  contents: read
  actions: write
  checks: write
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      tags:
        description: 'Playwright --grep filter (e.g. "@smoke|@auth"). Empty = run all.'
        required: false
        default: ''
      pr_number:
        description: 'PR number — when set, post results as a sticky PR comment. (Set automatically by the /run-e2e slash-command dispatcher.)'
        required: false
        default: ''
      head_sha:
        description: 'PR head commit SHA — when set, create a check run on that commit so the PR shows the result. (Set automatically by the /run-e2e dispatcher.)'
        required: false
        default: ''
  # NOTE: PR/push triggers intentionally disabled until E2E timings are stable.
  # When re-enabled, consider gating per-tag via path filters
  # (dorny/paths-filter or scripts/select-e2e-tags.sh) so admin-only changes only run @admin.
  # push:
  #   branches: [ main ]
  #   paths:
  #     - 'tests/**'
  #     - 'apps/web/**'
  #     - 'apps/api/**'
  #     - 'playwright.config.ts'
  #     - 'package.json'
  #     - 'package-lock.json'
  # pull_request:
  #   branches: [ main ]
  #   paths:
  #     - 'tests/**'
  #     - 'apps/web/**'
  #     - 'apps/api/**'
  #     - 'playwright.config.ts'
  #     - 'package.json'
  #     - 'package-lock.json'

jobs:
  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: playaplan_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Create PR check (in-progress)
      id: pr_check
      if: inputs.pr_number != '' && inputs.head_sha != ''
      uses: actions/github-script@v7
      with:
        script: |
          const { data: check } = await github.rest.checks.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            name: 'E2E Tests',
            head_sha: '${{ inputs.head_sha }}',
            status: 'in_progress',
            started_at: new Date().toISOString(),
            details_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            output: {
              title: 'E2E Tests running',
              summary: `Triggered by /run-e2e on PR #${{ inputs.pr_number }}.\n\n[View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
            },
          });
          core.setOutput('id', check.id);

    - name: Use Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx --yes playwright install --with-deps

    - name: Setup test environment
      run: |
        cp .env.sample .env
        echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/playaplan_test" >> .env
        echo "JWT_SECRET=test-secret-key-for-ci" >> .env
        echo "NODE_ENV=development" >> .env

    - name: Write seed.local.ts from secret
      env:
        E2E_SEED_LOCAL: ${{ secrets.E2E_SEED_LOCAL }}
      run: |
        if [ -z "$E2E_SEED_LOCAL" ]; then
          echo "::error::E2E_SEED_LOCAL secret is not set. Stripe-dependent tests would fail with confusing timeouts on the disabled 'Complete Registration' button. Add the secret under repo Settings → Secrets and variables → Actions (use the apps/api/prisma/seeds/seed.local.template.ts as a starting point, with Stripe TEST keys: pk_test_* / sk_test_*)."
          exit 1
        fi
        printf '%s' "$E2E_SEED_LOCAL" > apps/api/prisma/seeds/seed.local.ts
        echo "Wrote apps/api/prisma/seeds/seed.local.ts ($(wc -c < apps/api/prisma/seeds/seed.local.ts) bytes)"

    - name: Setup database (migrate + base seed + e2e personas + local creds)
      run: |
        cd apps/api
        npx --yes prisma generate
        npx --yes prisma migrate deploy
        npm run seed:dev:force
        npm run seed:e2e
        if [ -f prisma/seeds/seed.local.ts ]; then
          npm run seed:local
        fi
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/playaplan_test

    - name: Start API server in background
      run: |
        cd apps/api
        echo "Starting API server in development mode..."
        nohup npm run dev > api.log 2>&1 &
        echo $! > api.pid
        echo "API server started with PID $(cat api.pid)"
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/playaplan_test
        JWT_SECRET: test-secret-key-for-ci
        NODE_ENV: development
        PORT: 3000

    - name: Wait for API server to be ready
      run: |
        echo "Waiting for API server to start..."
        timeout 60 bash -c 'until curl -f http://localhost:3000/health 2>/dev/null; do
          echo "API not ready yet, waiting..."
          if [ -f apps/api/api.log ]; then
            echo "Last 10 lines of API log:"
            tail -10 apps/api/api.log
          fi
          sleep 2
        done'
        echo "API server is ready!"

    - name: Start Web server in background
      run: |
        cd apps/web
        echo "Starting Web server..."
        nohup npm run dev > web.log 2>&1 &
        echo $! > web.pid
        echo "Web server started with PID $(cat web.pid)"
      env:
        VITE_API_URL: http://localhost:3000
        NODE_ENV: development
        PORT: 5173

    - name: Wait for Web server to be ready
      run: |
        echo "Waiting for Web server to start..."
        timeout 60 bash -c 'until curl -f http://localhost:5173 2>/dev/null; do
          echo "Web server not ready yet, waiting..."
          if [ -f apps/web/web.log ]; then
            echo "Last 10 lines of Web log:"
            tail -10 apps/web/web.log
          fi
          sleep 2
        done'
        echo "Web server is ready!"

    - name: Run Playwright tests
      env:
        CI: true
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/playaplan_test
        JWT_SECRET: test-secret-key-for-ci
        NODE_ENV: development
        E2E_TAGS: ${{ inputs.tags }}
      run: |
        if [ -n "$E2E_TAGS" ]; then
          echo "Running with --grep \"$E2E_TAGS\""
          npx --yes playwright test --grep "$E2E_TAGS"
        else
          npx --yes playwright test
        fi

    - name: Generate Playwright summary markdown
      if: always()
      run: |
        mkdir -p /tmp/e2e
        node scripts/playwright-summary.mjs playwright-report/results.json > /tmp/e2e/summary.md
        cat /tmp/e2e/summary.md >> "$GITHUB_STEP_SUMMARY"

    - name: Post or update PR comment with results
      if: always() && inputs.pr_number != ''
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const marker = '<!-- e2e-ci-summary -->';
          const summary = fs.readFileSync('/tmp/e2e/summary.md', 'utf8');
          const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          const body = `${marker}\n${summary}\n[View full run](${runUrl})\n`;
          const prNumber = parseInt('${{ inputs.pr_number }}', 10);
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: prNumber,
            per_page: 100,
          });
          const existing = comments.find(c => c.body && c.body.startsWith(marker));
          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
          }

    - name: Complete PR check
      if: always() && steps.pr_check.outputs.id != ''
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const jobStatus = '${{ job.status }}';
          const conclusion = jobStatus === 'success'
            ? 'success'
            : jobStatus === 'cancelled' ? 'cancelled' : 'failure';
          let summary = '';
          try {
            summary = fs.readFileSync('/tmp/e2e/summary.md', 'utf8');
          } catch {
            summary = '_Test summary unavailable._';
          }
          // Check Run output.summary has a 65535-char limit; truncate defensively.
          if (summary.length > 60000) summary = summary.slice(0, 60000) + '\n\n_…truncated…_';
          await github.rest.checks.update({
            owner: context.repo.owner,
            repo: context.repo.repo,
            check_run_id: parseInt('${{ steps.pr_check.outputs.id }}', 10),
            status: 'completed',
            conclusion,
            completed_at: new Date().toISOString(),
            output: {
              title: `E2E ${conclusion}`,
              summary,
            },
          });

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 10

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: test-results/
        retention-days: 10

    - name: Show server logs on failure
      if: failure()
      run: |
        echo "=== API server logs ==="
        if [ -f apps/api/api.log ]; then
          cat apps/api/api.log
        else
          echo "No API log file found"
        fi
        echo ""
        echo "=== Web server logs ==="
        if [ -f apps/web/web.log ]; then
          cat apps/web/web.log
        else
          echo "No Web log file found"
        fi

    - name: Cleanup servers
      if: always()
      run: |
        echo "Stopping servers..."
        if [ -f apps/api/api.pid ]; then
          echo "Stopping API server with PID $(cat apps/api/api.pid)"
          kill $(cat apps/api/api.pid) || echo "API server already stopped"
          rm apps/api/api.pid
        fi
        if [ -f apps/web/web.pid ]; then
          echo "Stopping Web server with PID $(cat apps/web/web.pid)"
          kill $(cat apps/web/web.pid) || echo "Web server already stopped"
          rm apps/web/web.pid
        fi